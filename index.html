<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Generater</title>
    <link rel="stylesheet" href="mycss.css">

</head>
<body>
    <div class="description">
        Please input, No of Shapes, shape type(triangle, square, circle), and color of the shape (red, green, yellow, pink).
    </div>
    <div class="user-inputs">
       <form id="myfrm">
         <input type="text" id="no_of_shape"  placeholder="no of shapes eg.(2)">
        <input type="text" id="shape_type" placeholder="shape type eg.(triangle, square, circle)">
        <input type="text" id="shape_color"  placeholder="shape color eg.(red, green, yellow, pink)">
        <button id="generate_shape">Generate</button>
       </form>
    </div>
    <div class="container"></div>


    <script src="script.js"></script>
</body>
</html>
